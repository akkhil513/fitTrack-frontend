<div class="page" style="padding-bottom: 120px;">

      <!-- Motivation -->
      <div class="motivation">{{motivation()}}</div>

      <!-- Score -->
      <div class="score-card">
        <div class="score-num">{{doneCount()}}<span>/{{items.length}}</span></div>
        <div class="score-right">
          <div class="score-title">Daily Score</div>
          <div class="score-msg">{{scoreMessage()}}</div>
          <div class="score-bar">
            <div class="score-bar-fill" [style.width]="scorePct() + '%'"></div>
          </div>
        </div>
      </div>

      <!-- Groups -->
      @for (group of groups; track group.key) {
        <div class="group">
          <div class="group-label">{{group.icon}} {{group.label}}</div>
          @for (item of getGroupItems(group.key); track item.id) {
            <div class="check-item" [class.done]="checked()[item.id]" (click)="toggle(item.id)">
              <div class="check-box">{{checked()[item.id] ? '✓' : ''}}</div>
              <div class="check-info">
                <div class="check-name">{{item.name}}</div>
                <div class="check-time">{{item.time}}</div>
              </div>
              <div class="tag" [ngClass]="item.tag">{{item.tagLabel}}</div>
            </div>
          }
        </div>
      }

    </div>
