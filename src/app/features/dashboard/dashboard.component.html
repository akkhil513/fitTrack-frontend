<div
  class="min-h-screen pb-24"
  style="
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: &quot;DM Sans&quot;, sans-serif;
  "
>
  <div class="header-card">
    <div class="header-top">
      <div class="header-day">DAY {{ dayNumber() }} / 100</div>
      <div class="header-challenge">100 DAY CHALLENGE</div>
    </div>
    <div class="header-bottom">
      <div class="header-name">HEY, {{ userName() }} 👋</div>
      <button class="header-signout" (click)="signOut()">SIGN OUT</button>
    </div>
  </div>

  <!-- DROPDOWN MENU -->
  @if (menuOpen()) {
    <div class="dropdown-menu">
      <div class="dropdown-email">{{ userEmail() }}</div>
      <button
        class="dropdown-item"
        routerLink="/dashboard/profile"
        (click)="menuOpen.set(false)"
      >
        ⚙️ Profile & Settings
      </button>
      <button class="dropdown-item" (click)="signOut()">🚪 Sign Out</button>
    </div>
    <div class="dropdown-backdrop" (click)="menuOpen.set(false)"></div>
  }

  <!-- ROUTER OUTLET -->
  <router-outlet />

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a routerLink="today" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">✓</span>
      <span class="nav-label">TODAY</span>
    </a>
    <a routerLink="schedule" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">📅</span>
      <span class="nav-label">PLAN</span>
    </a>
    <a routerLink="log" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">📋</span>
      <span class="nav-label">LOG</span>
    </a>
    <a routerLink="profile" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">PROFILE</span>
    </a>
  </nav>
</div>
