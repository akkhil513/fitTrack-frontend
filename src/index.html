<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>FitTrack — 100 Day Challenge</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- PWA Core -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">

  <!-- iOS PWA — CRITICAL for install on iPhone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitTrack">
  <link rel="apple-touch-icon" href="icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192x192.png">

  <!-- iOS Splash Screens -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
    href="icons/splash-iphone14.png">

  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="FitTrack">

  <!-- SEO / Social -->
  <meta name="description" content="Your personal 100-day fitness transformation tracker">
  <meta property="og:title" content="FitTrack — 100 Day Challenge">
  <meta property="og:description"
    content="Track your 100-day transformation. Meals, workouts, progress — all in one app.">
  <meta property="og:image" content="icons/icon-512x512.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      background: #1a1a1a;
    }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 0 80px rgba(0, 0, 0, 0.9);
    }

    /* Splash screen while app loads */
    #app-loader {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }

    #app-loader .loader-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 4px;
      color: #e8ff47;
      margin-top: 16px;
    }

    #app-loader .loader-sub {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: #444;
      margin-top: 8px;
    }

    #app-loader .loader-bar {
      width: 120px;
      height: 2px;
      background: #1a1a1a;
      border-radius: 1px;
      margin-top: 24px;
      overflow: hidden;
    }

    #app-loader .loader-bar-fill {
      height: 100%;
      background: #e8ff47;
      border-radius: 1px;
      animation: load 1.5s ease-in-out infinite;
    }

    @keyframes load {
      0% {
        width: 0%;
        margin-left: 0;
      }

      50% {
        width: 60%;
        margin-left: 20%;
      }

      100% {
        width: 0%;
        margin-left: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- Splash loader -->
  <div id="app-loader">
    <div style="font-size:48px">💪</div>
    <div class="loader-title">FITTRACK</div>
    <div class="loader-sub">100 DAY CHALLENGE</div>
    <div class="loader-bar">
      <div class="loader-bar-fill"></div>
    </div>
  </div>

  <app-root></app-root>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }

    // Hide splash once Angular boots
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loader = document.getElementById('app-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      }, 1200);
    });

    // iOS install prompt helper
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window._installPrompt = e;
    });
  </script>
</body>

</html>
